{% extends "base.html" %}
{% block content %}
<h1>Personal Blog</h1>
<div class="articles">
    {% for article in articles %}
    <div class="article-row">
        <a href="/article/{{ article.id }}">{{ article.title }}</a>
        <span class="date">{{ article.publish_date.strftime('%B %d, %Y') }}</span>
    </div>
    {% endfor %}
</div>
{% endblock %}
