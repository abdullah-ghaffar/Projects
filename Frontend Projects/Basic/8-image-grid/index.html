<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Image Grid | CSS Grid Practice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <div class="grid-layout">
            
            <div class="grid-item tall">
                <img src="https://images.unsplash.com/photo-1505118380757-91f5f5632de0?q=80&w=600" alt="Foggy Beach">
            </div>

            <div class="grid-item">
                <img src="https://images.unsplash.com/photo-1533777857889-4be7c70b33f7?q=80&w=600" alt="Food Table">
            </div>

            <div class="grid-item tall">
                <img src="https://images.unsplash.com/photo-1464146072230-91cabc968266?q=80&w=600" alt="Apartment Buildings">
            </div>

            <div class="grid-item extra-tall">
                <img src="https://images.unsplash.com/photo-1518780664697-55e3ad937233?q=80&w=600" alt="Building with Red Door">
            </div>

            <div class="grid-item">
                <img src="https://images.unsplash.com/photo-1484154218962-a197022b5858?q=80&w=600" alt="Modern Living Room">
            </div>

            <div class="grid-item">
                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=600" alt="Beach Hill View">
            </div>

        </div>
    </main>

</body>
</html>
