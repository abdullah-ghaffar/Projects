<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Profile Form | Project</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="widget-wrapper">
        <div class="main-container">

            <section class="form-section">
                <form action="#" method="POST">
                    
                    <div class="input-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" name="fullName" placeholder="What should we call you?" required>
                    </div>

                    <div class="input-group has-error">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" value="john@doe.com" required aria-invalid="true" aria-describedby="email-error">
                        <span class="error-message" id="email-error">Email is already taken</span>
                    </div>

                    <div class="input-group password-group">
                        <label for="password">Enter Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" placeholder="xxxxxxxx" required>
                            <button type="button" class="toggle-password" aria-label="Show/Hide Password" aria-pressed="false">
                                <i class="fa-regular fa-eye" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>

                    <div class="input-group password-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="xxxxxxxx" required>
                            <button type="button" class="toggle-password" aria-label="Show/Hide Password" aria-pressed="false">
                                <i class="fa-regular fa-eye" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Update Profile</button>
                    </div>

                </form>
            </section>

            <aside class="status-panel">
                
                <div class="progress-section">
                    <div class="progress-circle-wrapper" aria-label="Profile Completeness: 65%" role="progressbar" aria-valuenow="65" aria-valuemin="0" aria-valuemax="100">
                        <div class="conic-gradient-overlay"></div>
                        <div class="percentage-text">65%</div>
                    </div>
                    <h2>Profile Completeness</h2>
                </div>

                <div class="checklist-box">
                    <ul>
                        <li class="completed">Create Account</li>
                        <li class="completed">Update Roadmap Progress</li>
                        <li class="completed">Setup Public Profile</li>
                        <li>Complete your first project</li>
                        <li>Invite your Friends</li>
                    </ul>
                </div>

            </aside>

        </div>
    </main>

</body>
</html>
