<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Consent Banner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="page-content">
        <header class="dummy-header"></header>
        <div class="dummy-hero"></div>
        <div class="dummy-text-blocks">
            <div class="block"></div>
            <div class="block"></div>
        </div>
    </div>

    <div id="cookie-banner" class="cookie-container">
        <button id="close-icon" class="close-x">&times;</button>
        
        <div class="cookie-icon">
            <i class="fa-solid fa-cookie-bite"></i>
        </div>

        <p class="cookie-text">
            We use cookies to improve your user experience.
        </p>

        <button id="accept-cookies" class="accept-btn">I like Cookies</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
